name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "helm/**"
      - "k8s/**"
jobs:
  # This is gonna have 4 stages (listed in readme)
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Build
        run: go build -o miniProjects-devops

      - name: Test
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run golangci linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker hub
        uses: docker/login-action@v4
        # Docker requires authentication passed in
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push action
        uses: docker/build-push-action@v7
        with:
          context: . # this is the root directory
          file: ./Dockerfile
          push: true # pushing to docker hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/miniprojects-devops:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in helm chart
        # replace "tag: ..." with "tag: [correct id]"
        run: |
          sed -i 's/tag: .*/tag: ${{github.runc_id}}"/' helm/miniprojects-devops-chart/values.yaml

      - name: Commit and push changes to github
        run: |
          git config --global user.email "parthmodi.amodi@gmail.com"
          git config --global user.name "PyroSh0ck"
          git add helm/miniprojects-devops-chart/values.yaml
          git commit -m "Update image tag in helm chart"
          git push
